spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lost_and_found?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # HTTP编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10分钟，单位毫秒

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:fzl_secret_key_for_jwt_token_generation_please_change_in_production}
  expiration: 36000000  # 10小时，单位毫秒

# 文件上传配置
file:
  upload:
    path: uploads  # 文件上传路径，相对于项目根目录
    domain: http://localhost:8083  # 文件访问域名

# 添加日志配置
logging:
  level:
    com.lostfound.server: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    root: INFO